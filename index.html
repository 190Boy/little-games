<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 HTML5 遊戲實驗室</title>
    <link rel="icon" type="image/svg+xml" href="gemini-svg.svg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --p: #6366f1; --s: #a855f7; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Poppins', 'Noto Sans TC', sans-serif; background: var(--bg); color: #f8fafc; margin: 0; padding: 0; }
        header { text-align: center; padding: 60px 20px; }
        header h1 { font-size: 3rem; background: linear-gradient(45deg, var(--p), var(--s)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .game-card { background: var(--card); border-radius: 20px; overflow: hidden; transition: 0.3s; text-decoration: none; color: inherit; border: 1px solid rgba(255,255,255,0.1); }
        .game-card:hover { transform: translateY(-10px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); border-color: var(--p); }
        .game-image { width: 100%; height: 200px; }
        .game-image img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 20px; }
        .btn { display: inline-block; background: var(--p); color: white; padding: 8px 20px; border-radius: 50px; font-weight: 600; margin-top: 15px; }
    </style>
</head>
<body>
    <header><h1>Game Studio</h1><p>由 AI 驅動的個人遊戲實驗室</p></header>
    <div class="game-grid">
        <a href="ooxx.html" class="game-card">
            <div class="game-image"><img src="img/ooxx.png" alt="Tic Tac Toe"></div>
            <div class="info"><h3>圈圈叉叉 AI</h3><p>挑戰具備防守意識的 AI，看看誰才是棋盤之王。</p><span class="btn">立即開始</span></div>
        </a>
        <a href="mahjong.html" class="game-card">
            <div class="game-image"><img src="img/mahjong.png" alt="Mahjong Connect"></div>
            <div class="info"><h3>麻將連連看</h3><p>考驗眼力與路徑判斷，經典的消除休閒遊戲。</p><span class="btn">挑戰關卡</span></div>
        </a>
        <a href="bricks.html" class="game-card">
            <div class="game-image"><img src="img/bricks.png" alt="Brick Breaker"></div>
            <div class="info"><h3>打磚塊大冒險</h3><p>高流暢度的 Canvas 動作遊戲，釋放壓力首選。</p><span class="btn">打破障礙</span></div>
        </a>
    </div>
</body>
</html>
