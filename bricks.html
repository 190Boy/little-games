<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>打磚塊大冒險</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        canvas { background: #111; border-bottom: 5px solid #6366f1; max-width: 100%; touch-action: none; }
        .info { color: white; padding: 15px; font-size: 20px; }
    </style>
</head>
<body>
    <div class="info">分數: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - 80;

        let score = 0;
        let paddle = { w: 100, h: 15, x: canvas.width/2 - 50 };
        let ball = { x: canvas.width/2, y: canvas.height-30, dx: 4, dy: -4, r: 8 };
        let bricks = [];
        const rowCount = 5, colCount = 6, bWidth = canvas.width/colCount - 10, bHeight = 25;

        for(let c=0; c<colCount; c++) {
            bricks[c] = [];
            for(let r=0; r<rowCount; r++) {
                bricks[c][r] = { x: 0, y: 0, status: 1 };
            }
        }

        document.addEventListener("touchmove", (e) => {
            let touchX = e.touches[0].clientX;
            paddle.x = touchX - paddle.w/2;
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // 畫球
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
            ctx.fillStyle = "#fff"; ctx.fill(); ctx.closePath();
            // 畫擋板
            ctx.fillStyle = "#6366f1"; ctx.fillRect(paddle.x, canvas.height-paddle.h, paddle.w, paddle.h);
            // 畫磚塊
            for(let c=0; c<colCount; c++) {
                for(let r=0; r<rowCount; r++) {
                    if(bricks[c][r].status == 1) {
                        let bx = c*(bWidth+10)+5; let by = r*(bHeight+10)+50;
                        bricks[c][r].x = bx; bricks[c][r].y = by;
                        ctx.fillStyle = `hsl(${r*40}, 70%, 50%)`;
                        ctx.fillRect(bx, by, bWidth, bHeight);
                    }
                }
            }
            collision();
            ball.x += ball.dx; ball.y += ball.dy;
            if(ball.x + ball.dx > canvas.width-ball.r || ball.x + ball.dx < ball.r) ball.dx = -ball.dx;
            if(ball.y + ball.dy < ball.r) ball.dy = -ball.dy;
            else if(ball.y + ball.dy > canvas.height-ball.r) {
                if(ball.x > paddle.x && ball.x < paddle.x + paddle.w) ball.dy = -ball.dy;
                else { alert("遊戲結束"); document.location.reload(); }
            }
            requestAnimationFrame(draw);
        }

        function collision() {
            for(let c=0; c<colCount; c++) {
                for(let r=0; r<rowCount; r++) {
                    let b = bricks[c][r];
                    if(b.status == 1) {
                        if(ball.x > b.x && ball.x < b.x+bWidth && ball.y > b.y && ball.y < b.y+bHeight) {
                            ball.dy = -ball.dy; b.status = 0; score++;
                            document.getElementById("score").innerText = score;
                            if(score == rowCount*colCount) { alert("你贏了！"); document.location.reload(); }
                        }
                    }
                }
            }
        }
        draw();
    </script>
</body>
</html>
